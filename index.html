<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katbghini? 💖</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
        }
        #main-gif {
            width: 200px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }
        h1 {
            color: #d81b60;
            font-size: 2rem;
            margin-bottom: 30px;
            min-height: 60px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 250px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #yesBtn { background-color: #f06292; color: white; z-index: 10; }
        #noBtn { background-color: #eeeeee; color: #757575; }
    </style>
</head>
<body>

    <div class="container">
        <img id="main-gif" src="cattyara.gif" alt="cattyara">
        
        <h1 id="question">Katbghini? 🥺</h1>

        <div class="buttons">
            <button id="yesBtn">AH</button>
            <button id="noBtn">LA</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const mainGif = document.getElementById('main-gif');

        const messages = [
            "Wach mt2kda? 🤔",
            "Choufi wkan... 🙄",
            "Wa zidi fkri! 😤",
            "Goli Ah 3afak 🥺",
            "Safi makhashnich... 💔",
            "Ghir kankdb GOLI AH! 😂"
        ];

        let messageIndex = 0;
        let yesSize = 1.2;
        let noOpacity = 1;

        noBtn.addEventListener('click', () => {
            question.innerText = messages[messageIndex];
            messageIndex = (messageIndex + 1) % messages.length;

            yesSize += 0.7; 
            yesBtn.style.fontSize = `${yesSize}rem`;
            yesBtn.style.padding = `${yesSize * 10}px ${yesSize * 22}px`;

            noOpacity -= 0.15; 
            noBtn.style.opacity = noOpacity;

            if (noOpacity <= 0.1) {
                noBtn.style.visibility = 'hidden';
            }
        });

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "Yaaay! 💖";
            // HNA SMIYA DYAL SORA DYAL L-FERHA (Optional)
            mainGif.src = "giphy.gif"; 
            noBtn.style.display = 'none';
            yesBtn.style.fontSize = "1.5rem";
        });
    </script>
</body>
</html>
